<svg xmlns="http://www.w3.org/2000/svg" width="1500" height="720" viewBox="0 0 1500 720" role="img" aria-labelledby="title desc">
  <title id="title">Технический радар компании Будущее 2.0</title>
  <desc id="desc">Четыре квадранта и кольца Adopt, Trial, Assess, Hold с технологиями целевой архитектуры.</desc>
  <rect width="1500" height="720" fill="#ffffff"/>
  <text x="750" y="32" text-anchor="middle" font-family="Arial, sans-serif" font-size="24" font-weight="700" fill="#1f2937">Будущее 2.0 — технический радар</text>

  <g transform="translate(315,360)" font-family="Arial, sans-serif">
    <circle r="260" fill="#fff7f7" stroke="#c62828" stroke-width="2"/>
    <circle r="205" fill="#fff8eb" stroke="#f59e0b" stroke-width="2"/>
    <circle r="145" fill="#eff6ff" stroke="#2563eb" stroke-width="2"/>
    <circle r="78" fill="#ecfdf5" stroke="#16a34a" stroke-width="2.5"/>
    <line x1="-260" y1="0" x2="260" y2="0" stroke="#64748b" stroke-width="1.5"/>
    <line x1="0" y1="-260" x2="0" y2="260" stroke="#64748b" stroke-width="1.5"/>

    <text x="8" y="-57" font-size="12" font-weight="700" fill="#166534">ADOPT</text>
    <text x="8" y="-123" font-size="12" font-weight="700" fill="#1d4ed8">TRIAL</text>
    <text x="8" y="-183" font-size="12" font-weight="700" fill="#b45309">ASSESS</text>
    <text x="8" y="-238" font-size="12" font-weight="700" fill="#991b1b">HOLD</text>

    <text x="130" y="-270" text-anchor="middle" font-size="14" font-weight="700" fill="#334155">Языки и фреймворки</text>
    <text x="-130" y="-270" text-anchor="middle" font-size="14" font-weight="700" fill="#334155">Платформы и данные</text>
    <text x="-130" y="286" text-anchor="middle" font-size="14" font-weight="700" fill="#334155">Инструменты</text>
    <text x="130" y="286" text-anchor="middle" font-size="14" font-weight="700" fill="#334155">Методы и паттерны</text>

    <g font-size="11" font-weight="700" text-anchor="middle" dominant-baseline="central">
      <g fill="#16a34a" stroke="#14532d"><circle cx="38" cy="-42" r="13"/><text x="38" y="-42" fill="white" stroke="none">1</text></g>
      <g fill="#dc2626" stroke="#7f1d1d"><circle cx="168" cy="-178" r="13"/><text x="168" y="-178" fill="white" stroke="none">2</text></g>

      <g fill="#16a34a" stroke="#14532d"><circle cx="-40" cy="-38" r="13"/><text x="-40" y="-38" fill="white" stroke="none">3</text></g>
      <g fill="#2563eb" stroke="#1e3a8a"><circle cx="-92" cy="-52" r="13"/><text x="-92" y="-52" fill="white" stroke="none">4</text></g>
      <g fill="#2563eb" stroke="#1e3a8a"><circle cx="-112" cy="-84" r="13"/><text x="-112" y="-84" fill="white" stroke="none">5</text></g>
      <g fill="#2563eb" stroke="#1e3a8a"><circle cx="-72" cy="-112" r="13"/><text x="-72" y="-112" fill="white" stroke="none">6</text></g>
      <g fill="#f59e0b" stroke="#92400e"><circle cx="-146" cy="-92" r="13"/><text x="-146" y="-92" fill="white" stroke="none">7</text></g>
      <g fill="#dc2626" stroke="#7f1d1d"><circle cx="-184" cy="-158" r="13"/><text x="-184" y="-158" fill="white" stroke="none">8</text></g>
      <g fill="#dc2626" stroke="#7f1d1d"><circle cx="-142" cy="-194" r="13"/><text x="-142" y="-194" fill="white" stroke="none">9</text></g>

      <g fill="#2563eb" stroke="#1e3a8a"><circle cx="-50" cy="91" r="13"/><text x="-50" y="91" fill="white" stroke="none">10</text></g>
      <g fill="#2563eb" stroke="#1e3a8a"><circle cx="-92" cy="76" r="13"/><text x="-92" y="76" fill="white" stroke="none">11</text></g>
      <g fill="#2563eb" stroke="#1e3a8a"><circle cx="-75" cy="122" r="13"/><text x="-75" y="122" fill="white" stroke="none">12</text></g>
      <g fill="#2563eb" stroke="#1e3a8a"><circle cx="-124" cy="102" r="13"/><text x="-124" y="102" fill="white" stroke="none">13</text></g>
      <g fill="#f59e0b" stroke="#92400e"><circle cx="-166" cy="92" r="13"/><text x="-166" y="92" fill="white" stroke="none">14</text></g>
      <g fill="#dc2626" stroke="#7f1d1d"><circle cx="-188" cy="166" r="13"/><text x="-188" y="166" fill="white" stroke="none">15</text></g>

      <g fill="#16a34a" stroke="#14532d"><circle cx="43" cy="45" r="13"/><text x="43" y="45" fill="white" stroke="none">16</text></g>
      <g fill="#2563eb" stroke="#1e3a8a"><circle cx="88" cy="72" r="13"/><text x="88" y="72" fill="white" stroke="none">17</text></g>
      <g fill="#2563eb" stroke="#1e3a8a"><circle cx="61" cy="111" r="13"/><text x="61" y="111" fill="white" stroke="none">18</text></g>
      <g fill="#2563eb" stroke="#1e3a8a"><circle cx="116" cy="49" r="13"/><text x="116" y="49" fill="white" stroke="none">19</text></g>
      <g fill="#2563eb" stroke="#1e3a8a"><circle cx="124" cy="101" r="13"/><text x="124" y="101" fill="white" stroke="none">20</text></g>
      <g fill="#f59e0b" stroke="#92400e"><circle cx="164" cy="92" r="13"/><text x="164" y="92" fill="white" stroke="none">21</text></g>
      <g fill="#dc2626" stroke="#7f1d1d"><circle cx="186" cy="164" r="13"/><text x="186" y="164" fill="white" stroke="none">22</text></g>
    </g>

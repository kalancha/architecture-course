  <g transform="translate(620,68)" font-family="Arial, sans-serif" fill="#1f2937">
    <text x="0" y="0" font-size="18" font-weight="700">Легенда</text>
    <text x="0" y="30" font-size="14" font-weight="700">Языки и фреймворки</text>
    <text x="0" y="52" font-size="13">1 — Java, Go, Python</text>
    <text x="0" y="72" font-size="13">2 — PowerBuilder</text>

    <text x="0" y="104" font-size="14" font-weight="700">Платформы и данные</text>
    <text x="0" y="126" font-size="13">3 — Power BI как тонкий клиент</text>
    <text x="0" y="146" font-size="13">4 — Изолированные облачные среды доменов</text>
    <text x="0" y="166" font-size="13">5 — S3 + Apache Iceberg</text>
    <text x="0" y="186" font-size="13">6 — Nessie + Dremio</text>
    <text x="0" y="206" font-size="13">7 — Kafka / Spark / Flink</text>
    <text x="0" y="226" font-size="13">8 — SQL Server 2008</text>
    <text x="0" y="246" font-size="13">9 — Центральный Apache Camel ESB</text>

    <text x="0" y="278" font-size="14" font-weight="700">Инструменты</text>
    <text x="0" y="300" font-size="13">10 — Airflow</text>
    <text x="0" y="320" font-size="13">11 — DataHub</text>
    <text x="0" y="340" font-size="13">12 — Terraform + CI/CD</text>
    <text x="0" y="360" font-size="13">13 — CDC, reconciliation, observability, data quality</text>
    <text x="0" y="380" font-size="13">14 — Policy as Code</text>
    <text x="0" y="400" font-size="13">15 — Ручные production-изменения</text>

    <text x="0" y="432" font-size="14" font-weight="700">Методы и паттерны</text>
    <text x="0" y="454" font-size="13">16 — Классификация, RBAC/ABAC, least privilege, audit</text>
    <text x="0" y="474" font-size="13">17 — Data Mesh</text>
    <text x="0" y="494" font-size="13">18 — Data Products, contracts и SLO</text>
    <text x="0" y="514" font-size="13">19 — Data Lakehouse</text>
    <text x="0" y="534" font-size="13">20 — 6R, CDC, parallel run, rollback</text>
    <text x="0" y="554" font-size="13">21 — Event-driven и real-time</text>
    <text x="0" y="574" font-size="13">22 — Бизнес-логика в DWH и Big Bang</text>

    <rect x="0" y="610" width="14" height="14" rx="7" fill="#16a34a"/><text x="22" y="622" font-size="12">Adopt</text>
    <rect x="82" y="610" width="14" height="14" rx="7" fill="#2563eb"/><text x="104" y="622" font-size="12">Trial</text>
    <rect x="160" y="610" width="14" height="14" rx="7" fill="#f59e0b"/><text x="182" y="622" font-size="12">Assess</text>
    <rect x="250" y="610" width="14" height="14" rx="7" fill="#dc2626"/><text x="272" y="622" font-size="12">Hold</text>
  </g>
</svg>


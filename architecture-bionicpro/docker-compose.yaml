x-airflow-common: &airflow-common
  build:
    context: ./airflow
    dockerfile: Dockerfile
  environment: &airflow-common-env
    AIRFLOW__CORE__EXECUTOR: LocalExecutor
    AIRFLOW__CORE__LOAD_EXAMPLES: 'false'
    AIRFLOW__CORE__DAGS_ARE_PAUSED_AT_CREATION: 'false'
    AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@airflow_db:5432/airflow
    AIRFLOW__WEBSERVER__SECRET_KEY: bionicpro_airflow_secret
    CRM_DB_HOST: crm_db
    CRM_DB_PORT: 5432
    CRM_DB_NAME: crm
    CRM_DB_USER: crm_user
    CRM_DB_PASSWORD: crm_password
    CLICKHOUSE_URL: http://clickhouse:8123
    CLICKHOUSE_DATABASE: bionicpro
    CLICKHOUSE_USER: default
    CLICKHOUSE_PASSWORD: clickhouse_password
  volumes:
    - ./airflow/dags:/opt/airflow/dags
  depends_on:
    - airflow_db
    - crm_db
    - clickhouse

services:
  keycloak_db:
    image: postgres:14
    environment:
      POSTGRES_DB: keycloak_db
      POSTGRES_USER: keycloak_user
      POSTGRES_PASSWORD: keycloak_password
    volumes:
      - keycloak-db-data:/var/lib/postgresql/data
    ports:
      - "5433:5432"
  keycloak:
    image: quay.io/keycloak/keycloak:21.1
    environment:
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: admin
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://keycloak_db:5432/keycloak_db
      KC_DB_USERNAME: keycloak_user
      KC_DB_PASSWORD: keycloak_password
    command: 
      - start-dev
      - --import-realm
    volumes:
      - ./keycloak/realm-export.json:/opt/keycloak/data/import/realm-export.json
    ports:
      - "8080:8080"
    depends_on:
      - keycloak_db
  crm_db:
    image: postgres:14
    environment:
      POSTGRES_DB: crm
      POSTGRES_USER: crm_user
      POSTGRES_PASSWORD: crm_password
    volumes:
      - crm-db-data:/var/lib/postgresql/data
      - ./crm/init:/docker-entrypoint-initdb.d
    ports:
      - "5434:5432"
  clickhouse:
    image: clickhouse/clickhouse-server:24.8
    environment:
      CLICKHOUSE_DB: bionicpro
      CLICKHOUSE_USER: default
      CLICKHOUSE_PASSWORD: clickhouse_password
      CLICKHOUSE_DEFAULT_ACCESS_MANAGEMENT: 1
    volumes:
      - clickhouse-data:/var/lib/clickhouse
      - ./clickhouse/initdb.d:/docker-entrypoint-initdb.d
    ports:
      - "8123:8123"
      - "9000:9000"
  airflow_db:
    image: postgres:14
    environment:
      POSTGRES_DB: airflow
      POSTGRES_USER: airflow
      POSTGRES_PASSWORD: airflow
    volumes:
      - airflow-db-data:/var/lib/postgresql/data
  airflow-init:
    <<: *airflow-common
    command: >
      bash -c "airflow db migrate &&
      (airflow users create --username admin --firstname Airflow --lastname Admin
      --role Admin --email admin@example.com --password admin || true)"
  airflow-webserver:
    <<: *airflow-common
    command: webserver
    ports:
      - "8081:8080"
    depends_on:
      - airflow-init
  airflow-scheduler:
    <<: *airflow-common
    command: scheduler
    depends_on:
      - airflow-init
  reports-api:
    build:
      context: ./api
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      PORT: 8000
      CLICKHOUSE_URL: http://clickhouse:8123
      CLICKHOUSE_DATABASE: bionicpro
      CLICKHOUSE_USER: default
      CLICKHOUSE_PASSWORD: clickhouse_password
      KEYCLOAK_JWKS_URL: http://keycloak:8080/realms/reports-realm/protocol/openid-connect/certs
      KEYCLOAK_ISSUER: http://localhost:8080/realms/reports-realm
      CORS_ORIGIN: http://localhost:3000
    depends_on:
      - clickhouse
      - keycloak
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        REACT_APP_API_URL: http://localhost:8000
        REACT_APP_KEYCLOAK_URL: http://localhost:8080
        REACT_APP_KEYCLOAK_REALM: reports-realm
        REACT_APP_KEYCLOAK_CLIENT_ID: reports-frontend
    ports:
      - "3000:3000"
    environment:
      REACT_APP_API_URL: http://localhost:8000
      REACT_APP_KEYCLOAK_URL: http://localhost:8080
      REACT_APP_KEYCLOAK_REALM: reports-realm
      REACT_APP_KEYCLOAK_CLIENT_ID: reports-frontend
    depends_on:
      - reports-api

volumes:
  keycloak-db-data:
  crm-db-data:
  airflow-db-data:
  clickhouse-data:
